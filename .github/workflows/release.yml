name: Release

# 推送形如 v1.2.3 的 tag 时触发
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # 创建 Release / 上传产物需要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 由 tag 推导版本号: v1.2.3 -> versionName=1.2.3
      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"

      # 还原签名密钥 (来自仓库 Secrets)
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks
          cat > app/keystore.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
        run: ./gradlew assembleRelease -PversionName=${{ steps.version.outputs.name }}

      - name: Clean up secrets
        if: always()
        run: rm -f app/release.jks app/keystore.properties

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hush-${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
